<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dof3ty | Login</title>
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    
    

    <header>
        <h1>Dof3ty</h1>
    </header>

    <main>
        <section class="form-box center">

            <h2>Welcome</h2>
            <small>
                <p>Please enter your workspace credentials</p>
            </small>


            
    
            <form action="login" method="post">

                <section class="role-switch">
                    <input type="radio" id="student" name="role" checked>
                    <label for="student">Student</label>
                  
                    <input type="radio" id="leader" name="role">
                    <label for="leader">Leader</label>
                </section>

                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" placeholder="Enter your username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="Enter your password" name="password" required>
                </div>

                <div class="borha">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    
                    <a href="#">Forgot Password?</a>
                </div>
                

                <button type="submit" class="submit btn">Login</button>

            </form>


        </section>

    </main>

    <footer>
        &copy; Hurghada University Team
    </footer>
        

</body>
</html>
